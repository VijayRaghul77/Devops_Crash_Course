name: CI Check

on:
  push:
  pull_request:

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Run syntax check
        run: python -m py_compile sample.py
      - name: Print success message
        run: echo "CI validation passed"
