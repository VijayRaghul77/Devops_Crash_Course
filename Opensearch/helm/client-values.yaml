---
clusterName: "opensearch-cluster"
nodeGroup: "client"
protocol: http

roles:
  - client
  #- remote_cluster_client

replicas: 1

opensearchJavaOpts: "-Xmx3g -Xms3g"

resources:
  limits:
    cpu: '8'
    memory: 10Gi
  requests:
    cpu: '1'
    memory: 4Gi

nodeSelector:
  agentpool: client

image:
  repository: "botml.azurecr.io/opensearchproject/opensearch"
  tag: "3.5.0"

config:
  opensearch.yml: |
    cluster.name: opensearch-cluster
    network.host: 0.0.0.0
    plugins.security.disabled: true
    plugins.security.ssl.transport.enabled: false
    plugins.security.ssl.http.enabled: false

extraEnvs:
  - name: discovery.seed_hosts
    value: "opensearch-cluster-master-headless"
  - name: JAVA_TOOL_OPTIONS
    value: "-XX:HeapDumpPath=/dev/null"
  - name: DISABLE_SECURITY_PLUGIN
    value: "true"
  # NOTE: no-op while security is disabled — see master-values.yaml comment.
  - name: OPENSEARCH_INITIAL_ADMIN_PASSWORD
    valueFrom:
      secretKeyRef:
        name: alpha-secrets
        key: opensearch-admin-secret

sysctlVmMaxMapCount: 262144

extraInitContainers:
  - name: sysctl
    image: botml.azurecr.io/general/shell:2.11
    imagePullPolicy: "IfNotPresent"
    command:
      - /bin/bash
      - -ec
      - |
        sysctl -w vm.max_map_count=262144
        sysctl -w fs.file-max=65536
    securityContext:
      runAsUser: 0
      privileged: true

keystore:
  - secretName: keystore-secrets

extraVolumes:
  - name: logvolume
    azureFile:
      secretName: alpha-secrets
      shareName: opensearch
      readOnly: false

extraVolumeMounts:
  - mountPath: "/usr/share/opensearch/config/analysis"
    name: logvolume

plugins:
  enabled: true
  installList:
    - repository-azure
    - https://github.com/aiven/prometheus-exporter-plugin-for-opensearch/releases/download/3.0.0.0/prometheus-exporter-3.0.0.0.zip

# CHANGED from LoadBalancer: with plugins.security.disabled/DISABLE_SECURITY_PLUGIN
# both true, the OpenSearch HTTP API has zero authentication. A LoadBalancer
# Service here would have handed anyone with the public IP full read/write/
# delete access to every index. ingress-base.yaml already exposes this same
# Service (opensearch-cluster-client:9200) externally at /os behind TLS, so
# ClusterIP is all that's needed — re-enable LoadBalancer only alongside the
# security plugin.
service:
  type: ClusterIP

serviceMonitor:
  enabled: true
  path: /_prometheus/metrics
  scheme: http
  tlsConfig:
    insecureSkipVerify: true
  interval: 10s

imagePullSecrets:
  - name: acr-auth
