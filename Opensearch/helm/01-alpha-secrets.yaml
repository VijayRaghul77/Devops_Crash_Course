# Credentials consumed by the opensearch-cluster nodes (master/data/client)
# and by the repository-azure snapshot plugin.
#
# Replace every placeholder below with the real value, e.g.:
#   kubectl create secret generic alpha-secrets -n opensearch \
#     --from-literal=azurestorageaccountname='<name>' \
#     --from-literal=azurestorageaccountkey='<key>' \
#     --from-literal=opensearch-admin-secret='<strong-password>' \
#     --dry-run=client -o yaml > 01-alpha-secrets.yaml
#
# Do NOT commit this file with real values filled in — it previously
# contained a live Azure Storage account key and admin password in
# base64 (base64 is encoding, not encryption). Keep real values out of
# git; use `stringData` locally or a secrets manager (Sealed Secrets,
# External Secrets Operator, Azure Key Vault CSI, etc.) in shared repos.
apiVersion: v1
kind: Secret
metadata:
  name: alpha-secrets
  namespace: opensearch
type: Opaque
stringData:
  azurestorageaccountname: "<YOUR_AZURE_STORAGE_ACCOUNT_NAME>"
  azurestorageaccountkey: "<YOUR_AZURE_STORAGE_ACCOUNT_KEY>"
  opensearch-admin-secret: "<YOUR_OPENSEARCH_ADMIN_PASSWORD>"
