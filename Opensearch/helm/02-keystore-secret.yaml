# Backs the `keystore: [{secretName: keystore-secrets}]` entry referenced by
# master/data/client values files. The opensearch helm chart runs
# `opensearch-keystore add` for every key in this secret, so key names must
# match the setting names the repository-azure plugin expects.
#
# This secret was referenced by all three node-group values files but was
# never actually defined anywhere — without it, pod init will fail while
# trying to populate the keystore. Create it before installing the charts.
apiVersion: v1
kind: Secret
metadata:
  name: keystore-secrets
  namespace: opensearch
type: Opaque
stringData:
  azure.client.default.account: "<YOUR_AZURE_STORAGE_ACCOUNT_NAME>"
  azure.client.default.key: "<YOUR_AZURE_STORAGE_ACCOUNT_KEY>"
