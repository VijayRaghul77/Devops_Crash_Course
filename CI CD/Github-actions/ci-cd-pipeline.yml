name: Production CI/CD Pipeline

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:


jobs:
  lint-and-verify:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    - uses: actions/setup-python@v5
      with:
        python-version: '3.11'
    - name: Syntax check
      run: python -m py_compile sample-app/app.py

  test:
    runs-on: ubuntu-latest
    needs: lint-and-verify
    steps:
    - uses: actions/checkout@v4
    - uses: actions/setup-python@v5
      with:
        python-version: '3.11'
    - name: Run sample test
      run: |
        python - <<'PY'
        print('Sample test passed')
        PY

  build:
    runs-on: ubuntu-latest
    needs: test
    steps:
    - uses: actions/checkout@v4
    - name: Build Docker image
      run: docker build -t ci-cd-sample ./sample-app

  security-scan:
    runs-on: ubuntu-latest
    needs: build
    steps:
    - uses: actions/checkout@v4
    - name: Security scan placeholder
      run: echo "Run Trivy or Snyk here"

  deploy-dev:
    runs-on: ubuntu-latest
    needs: security-scan
    environment: development
    steps:
    - name: Deploy to Dev
      run: echo "Deploying to development environment"

  deploy-staging:
    runs-on: ubuntu-latest
    needs: deploy-dev
    environment: staging
    steps:
    - name: Deploy to Staging
      run: echo "Deploying to staging environment"

  deploy-prod:
    runs-on: ubuntu-latest
    needs: deploy-staging
    environment: production
    steps:
    - name: Deploy to Production
      run: echo "Deploying to production environment"
