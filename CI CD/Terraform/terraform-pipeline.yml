name: Terraform CI/CD

on:
  push:
    paths:
    - 'CI CD/Terraform/**'
  pull_request:
    paths:
    - 'CI CD/Terraform/**'
  workflow_dispatch:


jobs:
  terraform-check:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    - name: Setup Terraform
      uses: hashicorp/setup-terraform@v3
    - name: Terraform fmt
      run: terraform -chdir=CI\ CD/Terraform fmt -check -recursive
    - name: Terraform init
      run: terraform -chdir=CI\ CD/Terraform init -backend=false
    - name: Terraform validate
      run: terraform -chdir=CI\ CD/Terraform validate

  terraform-plan:
    runs-on: ubuntu-latest
    needs: terraform-check
    steps:
    - uses: actions/checkout@v4
    - name: Setup Terraform
      uses: hashicorp/setup-terraform@v3
    - name: Terraform plan
      run: echo "Run terraform plan here"
